---
- name: Provision EC2 for PetClinic
  hosts: ec2
  become: yes
  vars:
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Pull PetClinic Docker image
      community.docker.docker_image:
        name: kastrel7/spring-petclinic
        tag: latest
        source: pull

    - name: Stop existing container if running
      community.docker.docker_container:
        name: petclinic
        state: absent
      ignore_errors: yes

    - name: Run PetClinic container
      community.docker.docker_container:
        name: petclinic
        image: kastrel7/spring-petclinic:latest
        state: started
        restart_policy: unless-stopped
        ports:
          - "8080:8080"