---
- name: Setup PetClinic Runtime Environment
  hosts: jenkins
  become: yes
  tasks:
    - name: Ensure Docker CLI is installed
      apt:
        name: docker.io
        state: present
        update_cache: yes

    - name: Ensure psmisc is installed
      apt:
        name: psmisc
        state: present

    - name: Create deployment directories
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /tmp/petclinic-dev
        - /tmp/petclinic-staging