# ── Project identification ─────────────────────────────────────────────────────
# Must match the projectKey used in the Jenkinsfile sonar:sonar command
sonar.projectKey=spring-petclinic
sonar.projectName=Spring PetClinic
sonar.projectVersion=4.0.0

# ── Source & binaries ──────────────────────────────────────────────────────────
# Tells SonarQube where the Java source files live
sonar.sources=src/main/java
# Tells SonarQube where the compiled .class files are (for bytecode analysis)
sonar.java.binaries=target/classes
# Test sources are analysed separately for coverage mapping
sonar.tests=src/test/java

# ── Coverage report ────────────────────────────────────────────────────────────
# Points SonarQube to the JaCoCo XML report generated by mvn test
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# ── Encoding ───────────────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8

# ── Exclusions ─────────────────────────────────────────────────────────────────
# Exclude generated code and config files from analysis
sonar.exclusions=**/target/**,**/*.xml,**/*.properties,**/resources/**
